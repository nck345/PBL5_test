data:
  sampling_rate: 50
  sensor_type: acc
  sensors:
  - acc
  - gyro
  fall_labels:
  - FOL
  - FKL
  - BSC
  - SDL
  adl_labels:
  - STD
  - WAL
  - JOG
  - JUM
  - STU
  - STN
  - SCH
  - SIT
  - CHU
  - CSI
  - CSO
  - LYI
  window_size: 100
  overlap: 0.15
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  strict_label_check: false
  data_dirs:
    - all
model:
  type: ensemble
  threshold: 0.8
  input_size: 9
  lstm:
    hidden_size: 30
    num_layers: 2
    dropout: 0.1
    bidirectional: false
  ensemble:
    num_models: 3
    overlap_ratio: 0.15
    meta_train_ratio: 0.25
    meta_learning_rate: 0.0005
  num_classes: 1
training:
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adam
  loss_function: focal
  use_sampler: true
  scheduler:
    type: cosine
    patience: 5
    factor: 0.5
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001
preprocessing:
  lowpass_filter:
    enabled: true
    cutoff_freq: 20
    order: 4
  normalization: standard
paths:
  checkpoint_dir: models/checkpoints
  final_model_dir: models/final_model
  log_dir: logs
evaluation:
  threshold_mode: val_calibrated
  threshold: 0.5
seed: 42
device: auto
